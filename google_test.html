<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Google Login Test</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <h2>Prueba Google SSO</h2>

    <div id="g_id_onload"
         data-client_id="868526984931-1mb248ghpljjk3343fbg8jioekae4dla.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>

    <div class="g_id_signin" data-type="standard"></div>

    <pre id="output"></pre>

    <script>
        function handleCredentialResponse(response) {
            document.getElementById("output").textContent = response.credential;
            console.log("ID TOKEN:", response.credential);
        }
    </script>
</body>
</html>
